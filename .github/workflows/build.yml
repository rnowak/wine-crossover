name: Build Wine-CrossOver

on:
  workflow_dispatch:
    inputs:
      cx_version:
        description: "CrossOver FOSS source version"
        required: true
        default: "26.1.0"
      create_release:
        description: "Create a GitHub release"
        required: true
        type: boolean
        default: true

env:
  CX_VERSION: ${{ inputs.cx_version }}

jobs:
  build:
    name: Build Wine-CrossOver (macOS arm64)
    runs-on: macos-14  # Apple Silicon M1
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          brew update
          brew install \
            bison \
            flex \
            pkg-config \
            gettext \
            mingw-w64 \
            llvm \
            freetype \
            gnutls \
            sdl2 \
            gstreamer \
            gst-plugins-base \
            molten-vk

      - name: Download CrossOver FOSS source
        run: |
          curl -L -o crossover-sources.tar.gz \
            "https://media.codeweavers.com/pub/crossover/source/crossover-sources-${CX_VERSION}.tar.gz"
          tar xzf crossover-sources.tar.gz
          echo "Wine version: $(cat sources/wine/VERSION)"

      - name: Patch FOSS source for missing proprietary components
        run: |
          WINEMAC="sources/wine/dlls/winemac.drv"

          # D3DMetal (Apple Game Porting Toolkit) support is gated behind
          # #if defined(__x86_64__) because it only works via Rosetta.
          # However, cocoa_window.m and event handling reference these symbols
          # unconditionally. Provide arm64 stubs via #else branches.

          # d3dmetal_objc.h — make WineMetalLayer visible on all arches
          sed -i '' 's/^#if defined(__x86_64__)$//' "$WINEMAC/d3dmetal_objc.h"
          sed -i '' '/^#endif$/d' "$WINEMAC/d3dmetal_objc.h"

          # d3dmetal_objc.m — add stub @implementation for arm64
          # Remove final #endif, append #else with stubs, close with #endif
          sed -i '' '$ s/^#endif$//' "$WINEMAC/d3dmetal_objc.m"
          cat >> "$WINEMAC/d3dmetal_objc.m" << 'EOF'
#else

#import <QuartzCore/QuartzCore.h>
#import "d3dmetal_objc.h"

@implementation WineMetalLayer
@end

#endif
EOF

          # d3dmetal.c — add stub macdrv_client_surface_presented for arm64
          sed -i '' '$ s/^#endif$//' "$WINEMAC/d3dmetal.c"
          cat >> "$WINEMAC/d3dmetal.c" << 'EOF'
#else

#include "macdrv_cocoa.h"
void macdrv_client_surface_presented(const macdrv_event *event) { }

#endif
EOF

          echo "Patched: added arm64 stubs for D3DMetal symbols"

      - name: Configure Wine
        run: |
          export PATH="$(brew --prefix bison)/bin:$(brew --prefix flex)/bin:$(brew --prefix llvm)/bin:$PATH"
          export PKG_CONFIG_PATH="$(brew --prefix freetype)/lib/pkgconfig:$(brew --prefix gnutls)/lib/pkgconfig:$(brew --prefix sdl2)/lib/pkgconfig:$(brew --prefix gstreamer)/lib/pkgconfig:$(brew --prefix gst-plugins-base)/lib/pkgconfig:$(brew --prefix molten-vk)/lib/pkgconfig"
          export CFLAGS="-I$(brew --prefix molten-vk)/include"
          export LDFLAGS="-L$(brew --prefix molten-vk)/lib"

          mkdir -p build
          cd build
          ../sources/wine/configure \
            --prefix= \
            --enable-archs=x86_64,i386 \
            --without-wayland \
            BISON="$(brew --prefix bison)/bin/bison"

      - name: Build Wine
        run: |
          export PATH="$(brew --prefix bison)/bin:$(brew --prefix flex)/bin:$(brew --prefix llvm)/bin:$PATH"
          cd build
          make -j$(sysctl -n hw.ncpu)

      - name: Package Wine
        id: package
        run: |
          cd build
          make install DESTDIR="${GITHUB_WORKSPACE}/staging/wine-crossover"

          WINE_VERSION=$(cat ../sources/wine/VERSION | sed 's/Wine version //')
          ARTIFACT_NAME="wine-crossover-${CX_VERSION}-macos-arm64"

          # Ad-hoc codesign all Mach-O binaries to satisfy Gatekeeper
          echo "Codesigning binaries..."
          find "${GITHUB_WORKSPACE}/staging/wine-crossover" \
            -type f \( -perm +111 -o -name "*.dylib" -o -name "*.so" \) \
            -exec sh -c '
              for f; do
                if file "$f" | grep -q "Mach-O"; then
                  codesign --force --deep -s - "$f" 2>/dev/null || true
                fi
              done
            ' _ {} +

          cd "${GITHUB_WORKSPACE}/staging"
          tar cJf "${GITHUB_WORKSPACE}/${ARTIFACT_NAME}.tar.xz" wine-crossover/

          echo "artifact_name=${ARTIFACT_NAME}" >> "$GITHUB_OUTPUT"
          echo "wine_version=${WINE_VERSION}" >> "$GITHUB_OUTPUT"

          # Generate SHA256 for the cask
          SHA=$(shasum -a 256 "${GITHUB_WORKSPACE}/${ARTIFACT_NAME}.tar.xz" | cut -d' ' -f1)
          echo "sha256=${SHA}" >> "$GITHUB_OUTPUT"
          echo "SHA256: ${SHA}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.artifact_name }}
          path: ${{ steps.package.outputs.artifact_name }}.tar.xz

      - name: Build summary
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| CrossOver Source | ${CX_VERSION} |" >> $GITHUB_STEP_SUMMARY
          echo "| Wine Version | ${{ steps.package.outputs.wine_version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Architecture | arm64 (Apple Silicon) |" >> $GITHUB_STEP_SUMMARY
          echo "| SHA256 | \`${{ steps.package.outputs.sha256 }}\` |" >> $GITHUB_STEP_SUMMARY

    outputs:
      artifact_name: ${{ steps.package.outputs.artifact_name }}
      wine_version: ${{ steps.package.outputs.wine_version }}
      sha256: ${{ steps.package.outputs.sha256 }}

  release:
    name: Create Release
    needs: build
    if: inputs.create_release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.artifact_name }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "crossover-${{ env.CX_VERSION }}"
          name: "Wine-CrossOver ${{ env.CX_VERSION }} (Wine ${{ needs.build.outputs.wine_version }})"
          body: |
            ## Wine-CrossOver ${{ env.CX_VERSION }}

            Built from [CodeWeavers FOSS source](https://www.codeweavers.com/crossover/source) (Wine ${{ needs.build.outputs.wine_version }}).

            ### Install via Homebrew
            ```
            brew tap rnowak/wine-crossover https://github.com/rnowak/wine-crossover
            brew install --cask wine-crossover
            ```

            ### Manual install
            ```bash
            curl -LO <release-url>/wine-crossover-${{ env.CX_VERSION }}-macos-arm64.tar.xz
            sudo mkdir -p /usr/local/wine-crossover
            sudo tar xJf wine-crossover-${{ env.CX_VERSION }}-macos-arm64.tar.xz -C /usr/local/
            export PATH="/usr/local/wine-crossover/bin:$PATH"
            ```

            ### SHA256
            | File | SHA256 |
            |------|--------|
            | `${{ needs.build.outputs.artifact_name }}.tar.xz` | `${{ needs.build.outputs.sha256 }}` |
          files: |
            ${{ needs.build.outputs.artifact_name }}.tar.xz
          draft: false
          prerelease: false

      - name: Update Cask SHA256
        run: |
          SHA="${{ needs.build.outputs.sha256 }}"
          CASK_FILE="Casks/wine-crossover.rb"

          # Replace sha256 line (handles both :no_check and previous hash)
          sed -i "s/sha256 .*/sha256 \"${SHA}\"/" "$CASK_FILE"

          # Verify the change
          echo "## Updated Cask" >> $GITHUB_STEP_SUMMARY
          echo '```ruby' >> $GITHUB_STEP_SUMMARY
          grep -A1 'version\|sha256' "$CASK_FILE" | head -4 >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          # Commit and push
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$CASK_FILE"
          git commit -m "chore: update cask SHA256 for crossover-${CX_VERSION}

          Auto-generated by build workflow after successful release."
          git push
